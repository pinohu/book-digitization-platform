# =============================================================================
# OMNISCAN AI - INFRASTRUCTURE ORCHESTRATION
# =============================================================================
# This configuration defines the local development and staging environment.
# For production, these services are mapped to AWS RDS (PostgreSQL) and 
# AWS ElastiCache (Redis).
#
# | Service | Resource Limit | Scaling Strategy | Persistence |
# | :--- | :--- | :--- | :--- |
# | API | 1vCPU / 2GB RAM | Horizontal (HPA) | Stateless |
# | DB | 2vCPU / 4GB RAM | Vertical / Read-Replica | EBS Volume |
# | Redis | 1vCPU / 1GB RAM | Cluster Mode | RDB/AOF |
# =============================================================================

version: '3.9'

services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: omniscan_api_prod
    ports: 
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://dynasty:${POSTGRES_PASSWORD:-prod_secure_pass_2024}@db:5432/book_digitization_platform
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-omniscan_prod_secret_8829104432}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_51NzExampleKey}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_test_secret}
      NEXT_PUBLIC_APP_URL: "https://app.omniscan.ai"
    depends_on:
      db: 
        condition: service_healthy
      redis: 
        condition: service_healthy
    restart: unless-stopped
    networks:
      - omniscan_net

  db:
    image: postgres:15-alpine
    container_name: omniscan_db_prod
    environment:
      POSTGRES_DB: book_digitization_platform
      POSTGRES_USER: dynasty
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prod_secure_pass_2024}
    volumes: 
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dynasty"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - omniscan_net

  redis:
    image: redis:7-alpine
    container_name: omniscan_cache_prod
    command: redis-server --appendonly yes
    volumes: 
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - omniscan_net

networks:
  omniscan_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local